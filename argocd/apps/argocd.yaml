apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: platform
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: platform
  sources:
    - repoURL: https://github.com/wesleyfebarretos/argocd-control-plane.git
      targetRevision: main
      path: platform/argocd
    - repoURL: https://github.com/wesleyfebarretos/argocd-control-plane.git
      targetRevision: main
      path: platform/argocd/bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
