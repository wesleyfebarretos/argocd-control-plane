apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ include "project-template.namespace" . }}
  namespace: argocd
spec:
  project: {{ include "project-template.namespace" . }}
  source:
    repoURL: https://github.com/wesleyfebarretos/argocd-applications.git
    path: tenants/{{ include "project-template.tenant" . }}/{{ include "project-template.project" . }}/overlays/{{ include "project-template.environment" . }}
    targetRevision: main
    plugin:
      name: kustomized-helm
  destination:
    namespace: {{ include "project-template.namespace" . }}
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
        prune: true
        selfHeal: true
    syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - ApplyOutOfSyncOnly=true
