deployment:
  envoyGateway:
    resources:
      limits:
        memory: 1024Mi
      requests:
        cpu: 100m
        memory: 256Mi
    provider:
      type: Kubernetes
      kubernetes:
        envoyService:
          type: LoadBalancer
          patch:
            type: MergeWithOverwrite
            value:
              spec:
                externalIPs:
                  - 192.168.1.100 