global:
  domain: argocd.internal # change to your domain
configs:
  # configs.params keys must NOT use dot-notation in chart >= 7.x
  # server.insecure is now set via server.extraArgs below
  params:
    create: true # required — tells the chart to create the ConfigMap
    controller.diff.server.side: 'true'
    application.namespaces: '*'
    applicationsetcontroller.namespaces: '*'
    applicationsetcontroller.enable.scm.providers: false
  cm:
    create: true
    admin.enabled: 'false'
    ## OIDC settings
    dex.config: |
      connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: Ov23cto1ueChXRpxULeK
            clientSecret: $dex.github.clientSecret
            orgs:
              - name: argocd-platform
        - type: gitlab
          id: gitlab
          name: GitLab
          config:
            baseURL: https://gitlab.com
            clientID: 96df4de94d47bd09774451f53083d434a2891f0e82010334a9a112b2c1354e67
            clientSecret: $dex.gitlab.clientSecret
            redirectURI: https://argocd.internal/api/dex/callback
            useLoginAsID: true
            groups:
              - argocd-labs/developers
    exec.enabled: 'true'
    timeout.reconciliation: 180s
    application.resourceTrackingMethod: annotation
    # Enable kustomize build options to allow the use of helm charts
    kustomize.buildOptions: --enable-helm --load-restrictor LoadRestrictionsNone
  cmp:
    create: true
    plugins:
      kustomized-helm:
        discover:
          find:
            command:
              - sh
              - -c
              - |
                if [ -f "./kustomization.yaml" ] || [ -f "./kustomization.yml" ] || [ -f "./Kustomization" ]; then
                  echo "kustomization found"
                fi
        generate:
          command: [sh, -c]
          args:
            - |
              set -eu
              (set -o pipefail 2>/dev/null) && set -o pipefail || true

              find_kustomization_file() {
                for candidate in "./kustomization.yaml" "./kustomization.yml" "./Kustomization"; do
                  if [ -f "${candidate}" ]; then
                    echo "${candidate}"
                    return 0
                  fi
                done
                return 1
              }

              parse_chart_home() {
                kustomization_file="$1"
                awk '
                  /^[[:space:]]*helmGlobals:[[:space:]]*$/ { in_globals=1; next }
                  in_globals && /^[[:space:]]*[A-Za-z0-9_]+:[[:space:]]*/ {
                    line=$0
                    if (line ~ /^[[:space:]]*chartHome:[[:space:]]*/) {
                      sub(/^[[:space:]]*chartHome:[[:space:]]*/, "", line)
                      gsub(/["'\'' ]/, "", line)
                      print line
                      exit
                    }
                    if (line !~ /^[[:space:]]*chartHome:[[:space:]]*/) {
                      in_globals=0
                    }
                  }
                ' "${kustomization_file}"
              }

              parse_helm_chart_names() {
                kustomization_file="$1"
                awk '
                  /^[[:space:]]*helmCharts:[[:space:]]*$/ { in_charts=1; next }
                  in_charts && /^[[:space:]]*[A-Za-z0-9_]+:[[:space:]]*$/ && $0 !~ /^[[:space:]]*-[[:space:]]/ { in_charts=0 }
                  in_charts && /^[[:space:]]*-[[:space:]]*name:[[:space:]]*/ {
                    line=$0
                    sub(/^[[:space:]]*-[[:space:]]*name:[[:space:]]*/, "", line)
                    gsub(/["'\'' ]/, "", line)
                    if (line != "") print line
                  }
                  in_charts && /^[[:space:]]*name:[[:space:]]*/ {
                    line=$0
                    sub(/^[[:space:]]*name:[[:space:]]*/, "", line)
                    gsub(/["'\'' ]/, "", line)
                    if (line != "") print line
                  }
                ' "${kustomization_file}"
              }

              parse_file_dependencies() {
                chart_yaml="$1"
                awk '
                  BEGIN { in_deps=0; name=""; repo="" }
                  /^[[:space:]]*dependencies:[[:space:]]*$/ { in_deps=1; next }
                  in_deps && /^[^[:space:]-]/ { in_deps=0 }
                  !in_deps { next }
                  {
                    line=$0
                    sub(/[[:space:]]+#.*/, "", line)
                    if (line ~ /^[[:space:]]*-[[:space:]]+/) {
                      if (name != "" && repo ~ /^file:\/\//) {
                        print name "|" repo
                      }
                      name=""
                      repo=""
                    }
                    if (line ~ /^[[:space:]]*-[[:space:]]*name:[[:space:]]*/) {
                      sub(/^[[:space:]]*-[[:space:]]*name:[[:space:]]*/, "", line)
                      gsub(/["'\'' ]/, "", line)
                      name=line
                    } else if (line ~ /^[[:space:]]*name:[[:space:]]*/) {
                      sub(/^[[:space:]]*name:[[:space:]]*/, "", line)
                      gsub(/["'\'' ]/, "", line)
                      name=line
                    } else if (line ~ /^[[:space:]]*repository:[[:space:]]*/) {
                      sub(/^[[:space:]]*repository:[[:space:]]*/, "", line)
                      gsub(/["'\'' ]/, "", line)
                      repo=line
                    }
                    if (name != "" && repo ~ /^file:\/\//) {
                      print name "|" repo
                      name=""
                      repo=""
                    }
                  }
                  END {
                    if (name != "" && repo ~ /^file:\/\//) {
                      print name "|" repo
                    }
                  }
                ' "${chart_yaml}"
              }

              VISITED="$(mktemp)"
              trap 'rm -f "${VISITED}"' EXIT

              already_visited() {
                chart_dir="$1"
                grep -Fqx "${chart_dir}" "${VISITED}" 2>/dev/null
              }

              mark_visited() {
                chart_dir="$1"
                printf '%s\n' "${chart_dir}" >> "${VISITED}"
              }

              build_chart_dependencies_recursive() {
                (
                  chart_dir="$1"
                  chart_dir="$(cd "${chart_dir}" && pwd -P)"

                  if already_visited "${chart_dir}"; then
                    exit 0
                  fi
                  mark_visited "${chart_dir}"

                  chart_yaml="${chart_dir}/Chart.yaml"
                  if [ ! -f "${chart_yaml}" ]; then
                    echo "Skipping ${chart_dir}: Chart.yaml not found" >&2
                    exit 0
                  fi

                  deps_file="$(mktemp)"
                  parse_file_dependencies "${chart_yaml}" > "${deps_file}"
                  while IFS='|' read -r dep_name dep_repo; do
                    [ -n "${dep_repo}" ] || continue
                    dep_rel="${dep_repo#file://}"
                    if dep_dir="$(cd "${chart_dir}" && cd "${dep_rel}" 2>/dev/null && pwd -P)"; then
                      build_chart_dependencies_recursive "${dep_dir}"
                    else
                      echo "Dependency path not found for ${dep_name}: ${dep_repo} (from ${chart_dir})" >&2
                      exit 1
                    fi
                  done < "${deps_file}"
                  rm -f "${deps_file}"

                  echo "Building helm dependencies for ${chart_dir}" >&2
                  helm dependency build "${chart_dir}" 1>&2
                )
              }

              kustomization_file="$(find_kustomization_file || true)"
              if [ -z "${kustomization_file}" ]; then
                echo "No kustomization file found in application path" >&2
                exit 1
              fi
              kustomization_dir="$(dirname "${kustomization_file}")"
              chart_home="$(parse_chart_home "${kustomization_file}")"
              if [ -z "${chart_home}" ]; then
                chart_home="charts"
              fi

              if chart_home_dir="$(cd "${kustomization_dir}" && cd "${chart_home}" 2>/dev/null && pwd -P)"; then
                charts_file="$(mktemp)"
                parse_helm_chart_names "${kustomization_file}" > "${charts_file}"
                while IFS= read -r chart_name; do
                  [ -n "${chart_name}" ] || continue
                  chart_dir="${chart_home_dir}/${chart_name}"
                  if [ -d "${chart_dir}" ]; then
                    build_chart_dependencies_recursive "${chart_dir}"
                  else
                    echo "Skipping ${chart_name}: ${chart_dir} not found (likely remote chart)" >&2
                  fi
                done < "${charts_file}"
                rm -f "${charts_file}"
              else
                echo "chartHome not found: ${chart_home}" >&2
              fi

              kustomize build --enable-helm --load-restrictor LoadRestrictionsNone
  rbac:
    create: true
    scopes: '[groups, email]'
    policy.default: ''
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters,     *, *, allow
      p, role:admin, repositories, *, *, allow
      p, role:admin, projects,     *, *, allow
      p, role:admin, exec, *, */*, allow
      g, argocd-platform:admins, role:admin
server:
  replicas: 1
  # TLS terminates at the platform Gateway; Argo CD serves plain HTTP internally.
  extraArgs: [--insecure]
  ingress:
    enabled: false
  httproute:
    enabled: true
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: platform
        namespace: envoy-gateway-system
        sectionName: https
    hostnames: [argocd.internal]
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
              # grpcroute:
              #   enabled: true
              #   parentRefs:
              #     - name: platform
              #       namespace: envoy-gateway-system
              #       sectionName: https
              #   hostnames:
              #     - grpc.argocd.internal
repoServer:
  extraArgs:
    - --plugin-use-manifest-generate-paths
  extraContainers:
    - name: cmp-kustomized-helm
      command:
        - /var/run/argocd/argocd-cmp-server
      image: quay.io/argoproj/argocd:v2.13.1
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: kustomized-helm.yaml
          name: argocd-cmp-cm
        - mountPath: /tmp
          name: cmp-tmp
  volumes:
    - name: argocd-cmp-cm
      configMap:
        name: argocd-cmp-cm
    - name: cmp-tmp
      emptyDir: {}
applicationSet:
  allowAnyNamespace: true
  replicas: 1
controller:
  replicas: 1
redis:
  enabled: true
notifications:
  enabled: true
